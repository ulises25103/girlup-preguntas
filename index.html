<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué intersección del feminismo te representa más?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,600&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --magenta:#A5378E;
    --magenta-deep:#6E1F63;
    --periwinkle:#6E8AC9;
    --orange:#F2762B;
    --cyan:#26C6CF;
    --navy:#2B2A68;
    --cream:#FBF6F1;
    --ink:#2A1230;
    --accent:var(--magenta);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{height:100%}

  body{
    font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:#fff;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    position:relative;
    overflow-x:hidden;
    background:
      radial-gradient(120% 90% at 80% -10%, #B8489F 0%, transparent 55%),
      radial-gradient(120% 90% at -10% 110%, #4E1648 0%, transparent 55%),
      linear-gradient(160deg, var(--magenta) 0%, var(--magenta-deep) 100%);
    background-attachment:fixed;
  }

  /* ---------- decorative background ---------- */
  .deco{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .deco svg{position:absolute;display:block}
  .waves{top:-10px;left:-30px;width:340px;opacity:.9}
  .doodle-1{bottom:-40px;right:-60px;width:300px;opacity:.55}
  .doodle-2{top:38%;left:-70px;width:240px;opacity:.4}
  .spark{filter:drop-shadow(0 0 8px rgba(38,198,207,.35));animation:tw 4s ease-in-out infinite}
  .s1{top:12%;right:8%;width:64px;animation-delay:.0s}
  .s2{bottom:16%;left:7%;width:42px;animation-delay:1.1s}
  .s3{top:62%;right:14%;width:30px;animation-delay:2.2s}
  @keyframes tw{0%,100%{transform:scale(1) rotate(0);opacity:.85}50%{transform:scale(1.18) rotate(8deg);opacity:.45}}

  /* ---------- layout ---------- */
  .app{position:relative;z-index:1;width:100%;max-width:600px}
  .screen{display:none;animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  .screen.active{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .slashes{font-family:'Anton',sans-serif;letter-spacing:2px;color:var(--cyan);opacity:.9;
    display:inline-block;transform:skewX(-12deg)}

  /* ---------- intro ---------- */
  .intro{text-align:center}
  .eyebrow{
    display:inline-block;font-weight:700;text-transform:uppercase;letter-spacing:3px;
    font-size:.72rem;background:var(--cyan);color:var(--navy);
    padding:7px 14px;border-radius:999px;margin-bottom:22px;
  }
  .intro h1{
    font-family:'Anton',sans-serif;font-weight:400;line-height:.98;
    text-transform:uppercase;letter-spacing:1px;
    font-size:clamp(2.4rem,9vw,4rem);
    text-shadow:3px 3px 0 var(--cyan), 6px 6px 0 rgba(43,42,104,.35);
  }
  .intro .sub{
    font-family:'Caveat',cursive;font-size:clamp(1.6rem,6vw,2.2rem);
    color:var(--orange);margin-top:14px;line-height:1;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .intro p.lead{
    margin:22px auto 30px;max-width:440px;font-size:1.05rem;line-height:1.6;
    color:rgba(255,255,255,.92);
  }
  .intro p.lead .hl{
    background:var(--cyan);color:var(--navy);font-weight:700;
    padding:.04em .3em;border-radius:6px;
    -webkit-box-decoration-break:clone;box-decoration-break:clone;
  }
  .brand{display:inline-flex;align-items:center;justify-content:center;margin-bottom:26px}
  .brand img{height:74px;width:auto;display:block;
    filter:drop-shadow(0 5px 14px rgba(40,8,40,.28))}

  .btn{
    border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:700;
    font-size:1.05rem;text-transform:uppercase;letter-spacing:1.5px;
    color:#fff;background:var(--orange);
    padding:16px 34px;border-radius:999px;
    box-shadow:0 8px 0 #C25515, 0 14px 22px rgba(0,0,0,.25);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 0 #C25515,0 18px 26px rgba(0,0,0,.28)}
  .btn:active{transform:translateY(4px);box-shadow:0 4px 0 #C25515,0 8px 14px rgba(0,0,0,.25)}
  .btn.ghost{background:transparent;color:#fff;box-shadow:none;border:2px solid rgba(255,255,255,.5);
    padding:13px 26px;font-size:.95rem}
  .btn.ghost:hover{background:rgba(255,255,255,.12);transform:none;border-color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:0 8px 0 #C25515}

  /* ---------- quiz card ---------- */
  .card{
    background:var(--cream);color:var(--ink);
    border-radius:26px;padding:22px 22px 18px;
    box-shadow:0 24px 56px rgba(40,8,40,.45);
    border:3px solid #fff;
    display:flex;flex-direction:column;
    max-height:calc(100dvh - 32px);
  }
  .progress-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex:0 0 auto}
  .qcount{font-weight:700;text-transform:uppercase;letter-spacing:1.5px;font-size:.72rem;color:var(--magenta)}
  .qcount b{font-family:'Anton',sans-serif;font-weight:400;font-size:1rem;color:var(--navy)}
  .bar{height:8px;background:#EADFE6;border-radius:999px;overflow:hidden;margin-bottom:16px;flex:0 0 auto}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--cyan),var(--orange));transition:width .4s ease}

  .question{
    font-family:'Anton',sans-serif;font-weight:400;line-height:1.08;
    font-size:clamp(1.25rem,2.4vw,1.6rem);color:var(--navy);
    text-transform:uppercase;margin-bottom:14px;flex:0 0 auto;
  }

  .options{
    display:flex;flex-direction:column;gap:8px;
    flex:1 1 auto;min-height:0;overflow-y:auto;
    margin:0 -4px;padding:2px 4px;
    scrollbar-width:thin;scrollbar-color:#d8c6d3 transparent;
  }
  .options::-webkit-scrollbar{width:7px}
  .options::-webkit-scrollbar-thumb{background:#d8c6d3;border-radius:999px}
  .opt{
    display:flex;align-items:center;gap:12px;text-align:left;width:100%;
    background:#fff;border:2px solid #E4D9E2;border-radius:14px;
    padding:10px 12px;cursor:pointer;color:var(--ink);
    font-family:'Poppins',sans-serif;font-size:.92rem;line-height:1.3;
    transition:border-color .15s, background .15s, transform .1s, box-shadow .15s;
  }
  .opt:hover{border-color:var(--magenta);transform:translateY(-1px);box-shadow:0 6px 16px rgba(165,55,142,.14)}
  .opt .dot{
    flex:0 0 auto;width:30px;height:30px;border-radius:50%;
    display:grid;place-items:center;font-family:'Anton',sans-serif;font-size:.95rem;
    background:#EDE3EA;color:var(--magenta);transition:background .15s,color .15s,transform .15s;
  }
  .opt.sel{border-color:var(--magenta);background:#FBEEF7;box-shadow:0 8px 20px rgba(165,55,142,.18)}
  .opt.sel .dot{background:var(--magenta);color:#fff;transform:scale(1.08)}

  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:12px;flex:0 0 auto}
  .back{background:none;border:none;cursor:pointer;color:var(--magenta);font-weight:600;
    font-family:'Poppins';font-size:.92rem;padding:8px 4px;visibility:hidden}
  .back:hover{text-decoration:underline}
  .next{
    border:none;cursor:pointer;font-family:'Poppins';font-weight:700;text-transform:uppercase;
    letter-spacing:1px;font-size:.9rem;color:#fff;background:var(--magenta);
    padding:12px 22px;border-radius:999px;box-shadow:0 6px 0 #7A1F6E;
    transition:transform .1s, box-shadow .1s, opacity .15s;
  }
  .next:hover{transform:translateY(-2px);box-shadow:0 8px 0 #7A1F6E}
  .next:active{transform:translateY(3px);box-shadow:0 3px 0 #7A1F6E}
  .next:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:0 6px 0 #7A1F6E}

  /* ---------- result ---------- */
  .result{text-align:center}
  .result .tag{
    display:inline-block;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;
    font-size:.72rem;color:rgba(255,255,255,.85);margin-bottom:10px;
  }
  .res-card{
    background:var(--cream);border-radius:30px;border:3px solid #fff;
    box-shadow:0 26px 60px rgba(40,8,40,.45);padding:34px 26px 30px;
    position:relative;overflow:hidden;
  }
  .res-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:10px;background:var(--accent);
  }
  .res-emoji{font-size:4.4rem;line-height:1;margin:6px 0 4px;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.15));animation:pop .5s .15s both}
  @keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  .res-axis{font-weight:700;text-transform:uppercase;letter-spacing:2px;font-size:.78rem;color:var(--accent);margin-bottom:6px}
  .res-title{
    font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
    color:var(--navy);line-height:1;font-size:clamp(1.9rem,7vw,2.7rem);
  }
  .res-title .br{color:var(--accent);font-size:.7em;vertical-align:middle;padding:0 .12em}
  .res-desc{color:#5a3a55;font-size:1.04rem;line-height:1.6;max-width:430px;margin:18px auto 4px}
  .res-bars{margin:24px auto 4px;max-width:380px;text-align:left;display:flex;flex-direction:column;gap:9px}
  .res-row{display:flex;align-items:center;gap:10px;font-size:.78rem;font-weight:600;color:#6b4f66}
  .res-row .lbl{flex:0 0 132px;text-align:right;text-transform:uppercase;letter-spacing:.3px;font-size:.7rem}
  .res-row .track{flex:1;height:9px;background:#EADFE6;border-radius:999px;overflow:hidden}
  .res-row .track > i{display:block;height:100%;border-radius:999px;width:0;transition:width .7s cubic-bezier(.2,.7,.3,1)}
  .res-row .num{flex:0 0 14px;text-align:left;color:#9a7e95}
  .result .actions{margin-top:26px;display:flex;flex-direction:column;align-items:center;gap:12px}

  /* ---------- footer mark ---------- */
  .mark{position:fixed;bottom:12px;left:0;right:0;text-align:center;z-index:0;
    font-weight:600;font-size:.72rem;letter-spacing:1px;color:rgba(255,255,255,.55);pointer-events:none}
  .mark b{font-weight:700}

  /* ---------- responsive: tablet / mobile ---------- */
  @media (max-width:600px){
    body{padding:12px}
    .brand{margin-bottom:18px}
    .brand img{height:54px}
    .intro h1{font-size:clamp(1.9rem,8.5vw,2.6rem)}
    .intro .sub{font-size:clamp(1.4rem,6.5vw,1.8rem);margin-top:10px}
    .intro p.lead{font-size:.98rem;line-height:1.55;margin:16px auto 24px;max-width:340px}
    .btn{font-size:.95rem;padding:14px 30px}

    .card{padding:18px 16px 14px;border-radius:22px;max-height:calc(100dvh - 24px)}
    .question{font-size:clamp(1.15rem,5.2vw,1.45rem)}
    .opt{font-size:.9rem;padding:10px 11px;gap:10px}
    .opt .dot{width:28px;height:28px;font-size:.9rem}

    .res-card{padding:26px 18px 24px;border-radius:22px}
    .res-emoji{font-size:3.6rem}
    .res-desc{font-size:.98rem}
    .res-row .lbl{flex-basis:112px;font-size:.66rem}
  }

  /* pantallas bajas: comprime el alto del intro para evitar scroll */
  @media (max-height:680px){
    .brand{margin-bottom:14px}
    .brand img{height:48px}
    .intro p.lead{margin:12px auto 18px}
    .intro .sub{margin-top:8px}
  }

  @media (max-width:360px){
    .opt{font-size:.86rem}
    .intro h1{font-size:1.8rem}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>

<!-- decorative background -->
<div class="deco" aria-hidden="true">
  <svg class="waves" viewBox="0 0 300 150">
    <g fill="none" stroke="var(--orange)" stroke-width="9" stroke-linecap="round">
      <path d="M-10 20 Q 40 -5 90 20 T 190 20 T 290 20"/>
      <path d="M-10 48 Q 40 23 90 48 T 190 48 T 290 48"/>
      <path d="M-10 76 Q 40 51 90 76 T 190 76 T 290 76"/>
      <path d="M-10 104 Q 40 79 90 104 T 190 104 T 290 104"/>
    </g>
  </svg>
  <svg class="doodle-1" viewBox="0 0 300 300">
    <path d="M40 250 C 0 200 60 150 120 175 C 190 205 150 90 90 110 C 20 135 80 40 160 70 C 250 105 210 200 270 180"
      fill="none" stroke="var(--navy)" stroke-width="7" stroke-linecap="round"/>
  </svg>
  <svg class="doodle-2" viewBox="0 0 240 240">
    <path d="M20 120 C 20 60 110 60 110 120 C 110 180 200 180 200 120 C 200 70 150 70 150 120"
      fill="none" stroke="var(--cyan)" stroke-width="6" stroke-linecap="round"/>
  </svg>
  <svg class="spark s1" viewBox="0 0 100 100"><path d="M50 0 C55 35 65 45 100 50 C65 55 55 65 50 100 C45 65 35 55 0 50 C35 45 45 35 50 0Z" fill="var(--cyan)"/></svg>
  <svg class="spark s2" viewBox="0 0 100 100"><path d="M50 0 C55 35 65 45 100 50 C65 55 55 65 50 100 C45 65 35 55 0 50 C35 45 45 35 50 0Z" fill="#fff"/></svg>
  <svg class="spark s3" viewBox="0 0 100 100"><path d="M50 0 C55 35 65 45 100 50 C65 55 55 65 50 100 C45 65 35 55 0 50 C35 45 45 35 50 0Z" fill="var(--orange)"/></svg>
</div>

<main class="app">

  <!-- INTRO -->
  <section class="screen intro active" id="screen-intro">
    <div class="brand"><img src="girl-up-logo-blanco.png" alt="Girl Up Argentina"></div>
    <h1>¿Qué intersección<br>del feminismo<br>te representa <span class="slashes">///</span> más?</h1>
    <div class="sub">descubrí tu eje</div>
    <p class="lead">Responde tres preguntas rápidas y conoce <span class="hl">cuál es tu causa</span> para comenzar a activar en nuestra red.</p>
    <button class="btn" id="startBtn">Empezar</button>
  </section>

  <!-- QUIZ -->
  <section class="screen" id="screen-quiz">
    <div class="card">
      <div class="progress-head">
        <span class="qcount">Pregunta <b id="qNow">1</b> de <b id="qTotal">3</b></span>
        <span class="slashes" style="font-size:1.3rem">////</span>
      </div>
      <div class="bar"><i id="barFill"></i></div>
      <h2 class="question" id="qText"></h2>
      <div class="options" id="optList"></div>
      <div class="nav">
        <button class="back" id="backBtn">← Atrás</button>
        <button class="next" id="nextBtn" disabled>Siguiente</button>
      </div>
    </div>
  </section>

  <!-- RESULT -->
  <section class="screen result" id="screen-result">
    <span class="tag">Tu resultado</span>
    <div class="res-card">
      <div class="res-emoji" id="resEmoji"></div>
      <div class="res-axis">Tu eje es</div>
      <h3 class="res-title"><span class="br">[</span><span id="resTitle"></span><span class="br">]</span></h3>
      <p class="res-desc" id="resDesc"></p>
      <div class="res-bars" id="resBars"></div>
    </div>
    <div class="actions">
      <button class="btn ghost" id="restartBtn">Volver a empezar</button>
    </div>
  </section>

</main>

<div class="mark">hecho por <b>girl up argentina</b></div>

<script>
/* ============================================================
   DATOS DEL CUESTIONARIO
   Cada opción suma puntos a UNA categoría (cat).
   Para dar pesos distintos, cambiá "points" (por defecto 1)
   o agregá la opción a más de una categoría duplicando filas.
   ============================================================ */
  const CATS = {
    A: { emoji:"🥇", title:"Desigualdad en el deporte", accent:"#F2762B",
         desc:"Te interesa transformar los espacios deportivos para que sean más igualitarios, inclusivos y libres de discriminación." },
    B: { emoji:"📱", title:"Derechos digitales", accent:"#1FB6C9",
         desc:"Te movilizan la seguridad en internet, la privacidad, la violencia digital y el acceso igualitario a la tecnología." },
    C: { emoji:"🏠", title:"Cuidados", accent:"#6E8AC9",
         desc:"Creés que una sociedad más justa empieza por reconocer y redistribuir las tareas de cuidado." },
    D: { emoji:"🏛️", title:"Incidencia política", accent:"#34327A",
         desc:"Te interesa participar, organizarte y generar cambios desde los espacios de decisión." },
    E: { emoji:"📚", title:"Educación", accent:"#A5378E",
         desc:"Pensás que la transformación social comienza con el acceso al conocimiento y una educación con perspectiva de género." },
    F: { emoji:"🩸", title:"Justicia menstrual", accent:"#E1485F",
         desc:"Te preocupa garantizar el acceso a información, productos y derechos vinculados a la gestión menstrual." },
    G: { emoji:"📢", title:"Comunicación y difusión", accent:"#7A52C7",
         desc:"Creés en el poder de las redes, los medios y la comunicación para cambiar realidades y amplificar voces." }
  };

  const QUESTIONS = [
    {
      q:"Si tuvieras que sumarte a una campaña, ¿cuál elegirías?",
      options:[
        { cat:"A", text:"Igual salario, recursos y oportunidades para las mujeres en el deporte." },
        { cat:"B", text:"Frenar la difusión de imágenes íntimas sin consentimiento y el acoso en redes." },
        { cat:"C", text:"Que las tareas domésticas y de cuidado sean compartidas y reconocidas." },
        { cat:"D", text:"Lograr que más jóvenes y mujeres participen en espacios de decisión." },
        { cat:"E", text:"Garantizar una educación libre de violencias y estereotipos de género." },
        { cat:"F", text:"Acceso gratuito a productos de gestión menstrual y educación menstrual." },
        { cat:"G", text:"Combatir los discursos de odio y promover una comunicación responsable." }
      ]
    },
    {
      q:"¿Qué noticia te interesaría leer primero?",
      options:[
        { cat:"A", text:"Una deportista logró cambios históricos en su disciplina." },
        { cat:"B", text:"Se aprobó una ley contra la violencia digital." },
        { cat:"C", text:"Se creó un sistema público de cuidados." },
        { cat:"D", text:"Jóvenes impulsaron una política pública en su comunidad." },
        { cat:"E", text:"Se implementó un programa innovador de Educación Sexual Integral." },
        { cat:"F", text:"Una ciudad eliminó impuestos a productos de gestión menstrual." },
        { cat:"G", text:"Una campaña en redes logró cambiar una situación de discriminación." }
      ]
    },
    {
      q:"¿Qué actividad elegirías para un sábado?",
      options:[
        { cat:"A", text:"Participar en un torneo o encuentro deportivo." },
        { cat:"B", text:"Aprender sobre seguridad digital y redes sociales." },
        { cat:"C", text:"Debatir cómo construir una sociedad más corresponsable en los cuidados." },
        { cat:"D", text:"Participar de un centro de estudiantes o espacio de participación juvenil." },
        { cat:"E", text:"Coordinar un taller con adolescentes sobre igualdad de género." },
        { cat:"F", text:"Organizar una colecta o campaña sobre gestión menstrual." },
        { cat:"G", text:"Crear contenido para redes sobre derechos e igualdad." }
      ]
    }
  ];

/* ============================================================
   LÓGICA
   ============================================================ */
  const $ = s => document.querySelector(s);
  const screens = {
    intro:  $("#screen-intro"),
    quiz:   $("#screen-quiz"),
    result: $("#screen-result")
  };
  function show(name){
    Object.values(screens).forEach(s=>s.classList.remove("active"));
    screens[name].classList.add("active");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  const state = { i:0, answers:new Array(QUESTIONS.length).fill(null) };

  function renderQuestion(){
    const q = QUESTIONS[state.i];
    $("#qNow").textContent = state.i + 1;
    $("#qTotal").textContent = QUESTIONS.length;
    $("#barFill").style.width = ((state.i) / QUESTIONS.length * 100) + "%";
    $("#qText").textContent = q.q;

    const list = $("#optList");
    list.innerHTML = "";
    q.options.forEach((opt, idx) => {
      const b = document.createElement("button");
      b.className = "opt" + (state.answers[state.i] === idx ? " sel" : "");
      b.innerHTML = `<span class="dot">${opt.cat}</span><span>${opt.text}</span>`;
      b.addEventListener("click", () => {
        state.answers[state.i] = idx;
        [...list.children].forEach(c => c.classList.remove("sel"));
        b.classList.add("sel");
        $("#nextBtn").disabled = false;
      });
      list.appendChild(b);
    });

    $("#backBtn").style.visibility = state.i === 0 ? "hidden" : "visible";
    $("#nextBtn").disabled = state.answers[state.i] === null;
    $("#nextBtn").textContent = state.i === QUESTIONS.length - 1 ? "Ver resultado" : "Siguiente";
  }

  function computeWinner(){
    const scores = {};
    const order = [];
    state.answers.forEach((idx, qi) => {
      const cat = QUESTIONS[qi].options[idx].cat;
      const pts = QUESTIONS[qi].options[idx].points || 1;
      scores[cat] = (scores[cat] || 0) + pts;
      order.push(cat);
    });
    const max = Math.max(...Object.values(scores));
    // desempate: gana la categoría elegida primero entre las empatadas
    const winner = order.find(cat => scores[cat] === max);
    return { winner, scores, max };
  }

  function renderResult(){
    const { winner, scores, max } = computeWinner();
    const c = CATS[winner];
    document.documentElement.style.setProperty("--accent", c.accent);
    $("#resEmoji").textContent = c.emoji;
    $("#resTitle").textContent = c.title;
    $("#resDesc").textContent = c.desc;

    // mini desglose de puntajes
    const bars = $("#resBars");
    bars.innerHTML = "";
    Object.keys(CATS)
      .filter(k => scores[k])
      .sort((a,b) => scores[b] - scores[a])
      .forEach(k => {
        const row = document.createElement("div");
        row.className = "res-row";
        row.innerHTML =
          `<span class="lbl">${CATS[k].title}</span>` +
          `<span class="track"><i style="background:${CATS[k].accent}"></i></span>` +
          `<span class="num">${scores[k]}</span>`;
        bars.appendChild(row);
        requestAnimationFrame(() => {
          row.querySelector("i").style.width = (scores[k] / max * 100) + "%";
        });
      });

    show("result");
  }

  // navegación
  $("#startBtn").addEventListener("click", () => { renderQuestion(); show("quiz"); });
  $("#backBtn").addEventListener("click", () => { if(state.i>0){ state.i--; renderQuestion(); } });
  $("#nextBtn").addEventListener("click", () => {
    if (state.answers[state.i] === null) return;
    if (state.i < QUESTIONS.length - 1){ state.i++; renderQuestion(); }
    else { $("#barFill").style.width = "100%"; renderResult(); }
  });
  $("#restartBtn").addEventListener("click", () => {
    state.i = 0;
    state.answers = new Array(QUESTIONS.length).fill(null);
    show("intro");
  });
</script>
</body>
</html>
